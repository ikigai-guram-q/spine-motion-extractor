<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spine Motion Extractor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 🔥 REPLACED TITLE -->
  <img src="extractor.png" class="title-image" alt="Spine Motion Extractor">

  <div class="drop-zone" id="dropZone">
    Drag & Drop Spine JSON here
    <input type="file" id="fileInput" accept=".json">
  </div>

<div class="controls">
  <span class="label">Animation:</span>
  <select id="animationSelect"></select>

  <select id="boneSelect"></select>

    <select id="propertySelect">
      <option value="translate.x">translate.x</option>
      <option value="translate.y">translate.y</option>
      <option value="scale.x">scale.x</option>
      <option value="scale.y">scale.y</option>
      <option value="rotate">rotate</option>
    </select>

    <button id="extractBtn">Extract</button>
  </div>

  <pre id="output"></pre>

  <canvas id="curveCanvas" width="900" height="320"></canvas>
</div>

<script src="main.js"></script>
</body>
</html><!DOCTYPE html>


<script src="main.js"></script>
</body>
</html>
