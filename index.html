<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motion Extractor</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <img src="extractor.png" class="logo" />
    </div>

    <!-- Controls -->
    <div class="controls">
      <input type="file" id="fileInput" accept=".json" />

      <label>Animation:</label>
      <select id="animationSelect"></select>

      <button id="extractBtn">Extract</button>
    </div>

    <!-- Output -->
    <div id="output" class="outputBox"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
