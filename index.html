<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spine Motion Extractor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Spine Motion Extractor</h1>

  <div class="drop-zone" id="dropZone">
    Drag & Drop Spine files here<br>
    <span>Required: .json + .atlas + .webp/.png</span>
    <input type="file" id="fileInput" multiple accept=".json,.atlas,.webp,.png">
  </div>

  <div class="fileStatus" id="fileStatus">
    No files loaded.
  </div>

  <div class="controls">
    <select id="animationSelect"></select>
    <select id="boneSelect"></select>

    <select id="propertySelect">
      <option value="translate.x">translate.x</option>
      <option value="translate.y">translate.y</option>
      <option value="scale.x">scale.x</option>
      <option value="scale.y">scale.y</option>
      <option value="rotate">rotate</option>
    </select>

    <button id="extractBtn">Extract</button>
  </div>

  <pre id="output"></pre>

  <canvas id="curveCanvas" width="900" height="320"></canvas>

  <h2>Animation Preview</h2>
  <div id="previewBox"></div>
</div>

<script src="https://pixijs.download/v7.4.3/pixi.min.js"></script>
<script src="https://unpkg.com/@esotericsoftware/spine-pixi-v7@4.2.110/dist/iife/spine-pixi-v7.min.js"></script>
<script src="main.js"></script>

</body>
</html>
